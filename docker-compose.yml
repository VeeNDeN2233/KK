services:
  postgres:
    image: postgres:16-alpine
    container_name: ck-postgres
    environment:
      POSTGRES_USER: ck
      POSTGRES_PASSWORD: ck
      POSTGRES_DB: ck
    ports:
      - "5433:5432"
    volumes:
      - ck_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ck -d ck"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  ck_postgres_data:

